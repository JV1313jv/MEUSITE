<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Use Charme</title>

<style>
body{
    margin:0;
    font-family:Georgia, serif;
    background:#f7f4ef;
    color:#232F63;
}

header{
    background:#232F63;
    color:#E8E0D5;
    text-align:center;
    padding:60px 20px;
}

header h1{
    margin:0;
    font-size:50px;
}

header p{
    font-size:18px;
}

.insta{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:#E8E0D5;
    color:#232F63;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:320px;
    object-fit:cover;
}

.card h3{
    margin:15px;
}

.price{
    margin:0 15px 15px;
    font-size:22px;
    font-weight:bold;
    color:#232F63;
}

.card button{
    width:100%;
    border:none;
    padding:15px;
    background:#232F63;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.card button:hover{
    background:#182149;
}

footer{
    background:#232F63;
    color:#E8E0D5;
    text-align:center;
    padding:25px;
}
</style>

</head>
<body>

<header>
    <h1>Use Charme</h1>
    <p>Elegância, conforto e estilo para você</p>

    <a class="insta"
       href="https://www.instagram.com/_usecharme_/"
       target="_blank">
       Ver Instagram
    </a>
</header>

<div class="container">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1518611012118-696072aa579a?auto=format&fit=crop&w=800&q=80">
        <h3>Legging Premium</h3>
        <p class="price">R$ 99,90</p>
        <button>Comprar</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1514996937319-344454492b37?auto=format&fit=crop&w=800&q=80">
        <h3>Conjunto Fitness</h3>
        <p class="price">R$ 129,90</p>
        <button>Comprar</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1506629905607-d9d31e4f2d6b?auto=format&fit=crop&w=800&q=80">
        <h3>Top Fitness</h3>
        <p class="price">R$ 59,90</p>
        <button>Comprar</button>
    </div>

</div>

<footer>
    © 2026 Use Charme - Todos os direitos reservados
</footer>

</body>
</html>
