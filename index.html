<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Site</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #000, #1a1a1a);
    color: white;
    text-align: center;
}

header {
    padding: 60px 20px;
    background: #0077ff;
}

header h1 {
    margin: 0;
    font-size: 40px;
}

p {
    font-size: 18px;
    opacity: 0.8;
}

button {
    margin-top: 20px;
    padding: 15px 25px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    background: #00ff88;
    color: black;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

section {
    padding: 50px 20px;
}
</style>
</head>

<body>

<header>
    <h1>🚀 Meu Primeiro Site</h1>
    <p>Feito grátis com GitHub Pages</p>

    <button onclick="msg()">Clique aqui</button>
</header>

<section>
    <h2>Sobre mim</h2>
    <p>Esse site foi criado do zero e está online agora.</p>
</section>

<script>
function msg(){
    alert("🔥 Seu site está funcionando!");
}
</script>

</body>
</html>
